services:
  web:
    build:
      context: .
    container_name: weather-web
    env_file:
      - .env
    environment:
      WEATHER_DB_PATH: ${WEATHER_DB_PATH:-/data/weather.sqlite3}
    volumes:
      - ./data:/data
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_BIND_PORT:-18080}:8000"

  bot:
    build:
      context: .
    container_name: weather-bot
    command: ["python", "bot.py"]
    env_file:
      - .env
    environment:
      WEATHER_DB_PATH: ${WEATHER_DB_PATH:-/data/weather.sqlite3}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ./data:/data
    restart: unless-stopped
