<!doctype html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% block title %}{{ app_title }}{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>
        (function () {
            const theme = localStorage.getItem("theme") || "light";
            document.documentElement.setAttribute("data-bs-theme", theme);
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/vendor/tabler/icons/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/dashboard.css">
    {% if yandex_metrika_enabled %}
    <!-- Yandex.Metrika counter -->
    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a);
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id={{ yandex_metrika_id }}', 'ym');
        ym({{ yandex_metrika_id }}, 'init', {ssr:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <!-- /Yandex.Metrika counter -->
    {% endif %}
    {% block head %}{% endblock %}
</head>
<body>
    {% if yandex_metrika_enabled %}
    <noscript><div><img src="https://mc.yandex.ru/watch/{{ yandex_metrika_id }}" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
    {% endif %}

    <div class="topbar">
        <a href="/" class="brand"><span class="brand-dot"></span>{{ site_brand }}</a>
        <nav class="nav">
            <a class="nav-item {% if request.url.path == '/' %}active{% endif %}" href="/">Главная</a>
            <a class="nav-item {% if request.url.path.startswith('/charts') %}active{% endif %}" href="/charts">Графики</a>
            <a class="nav-item {% if request.url.path.startswith('/history') %}active{% endif %}" href="/history">История</a>
            <a class="nav-item {% if request.url.path.startswith('/station') %}active{% endif %}" href="/station">Состояние станции</a>
            {% if admin_enabled %}
            <a class="nav-item {% if request.url.path.startswith('/admin') %}active{% endif %}" href="/admin/settings">Админка</a>
            {% endif %}
        </nav>
        <div class="topbar-right">
            <button id="theme-toggle" type="button" class="icon-btn" title="Переключить тему" aria-label="Переключить тему">
                <i class="ti ti-sun"></i>
            </button>
        </div>
    </div>

    <div class="dashboard">
        {% block content %}{% endblock %}
    </div>

    <script>
        (function () {
            const btn = document.getElementById("theme-toggle");
            if (!btn) return;
            const icon = btn.querySelector("i");
            const setTheme = (theme) => {
                document.documentElement.setAttribute("data-bs-theme", theme);
                localStorage.setItem("theme", theme);
                if (icon) icon.className = theme === "dark" ? "ti ti-moon" : "ti ti-sun";
            };
            setTheme(localStorage.getItem("theme") || "light");
            btn.addEventListener("click", () => {
                const current = document.documentElement.getAttribute("data-bs-theme") || "light";
                setTheme(current === "dark" ? "light" : "dark");
                window.dispatchEvent(new CustomEvent("theme-changed"));
            });
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
