<!doctype html>
<html lang="ru" data-bs-theme="light">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{% block title %}Метеостанция{% endblock %}</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <script>
        (function () {
            const theme = localStorage.getItem("theme") || "light";
            document.documentElement.setAttribute("data-bs-theme", theme);
        })();
    </script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/css/tabler.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.35.0/dist/tabler-icons.min.css">
    <link rel="stylesheet" href="/static/tabler-custom.css">
    <!-- Yandex.Metrika counter -->
    <script type="text/javascript">
        (function(m,e,t,r,i,k,a){
            m[i]=m[i]||function(){(m[i].a=m[i].a||[]).push(arguments)};
            m[i].l=1*new Date();
            for (var j = 0; j < document.scripts.length; j++) {if (document.scripts[j].src === r) { return; }}
            k=e.createElement(t),a=e.getElementsByTagName(t)[0],k.async=1,k.src=r,a.parentNode.insertBefore(k,a);
        })(window, document,'script','https://mc.yandex.ru/metrika/tag.js?id=107729227', 'ym');
        ym(107729227, 'init', {ssr:true, clickmap:true, ecommerce:"dataLayer", referrer: document.referrer, url: location.href, accurateTrackBounce:true, trackLinks:true});
    </script>
    <!-- /Yandex.Metrika counter -->
    {% block head %}{% endblock %}
</head>
<body>
    <noscript><div><img src="https://mc.yandex.ru/watch/107729227" style="position:absolute; left:-9999px;" alt="" /></div></noscript>
    <div class="page">
        <header class="navbar navbar-expand-md d-print-none">
            <div class="container-xl">
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbar-menu" aria-controls="navbar-menu" aria-expanded="false" aria-label="Переключить навигацию">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <h1 class="navbar-brand navbar-brand-autodark pe-0 pe-md-3 mb-0">
                    <a href="/">
                        <span class="text-primary">weather.shkinev.me</span>
                    </a>
                </h1>
                <div class="navbar-nav flex-row order-md-last align-items-center">
                    <div class="nav-item">
                        <button id="theme-toggle" class="btn btn-icon btn-ghost-secondary" type="button" aria-label="Переключить тему">
                            <i class="ti ti-sun"></i>
                        </button>
                    </div>
                </div>
                <div class="collapse navbar-collapse" id="navbar-menu">
                    <div class="d-flex flex-column flex-md-row flex-fill align-items-stretch align-items-md-center">
                        <ul class="navbar-nav">
                            <li class="nav-item {% if request.url.path == '/' %}active{% endif %}">
                                <a class="nav-link" href="/">
                                    <span class="nav-link-icon d-md-none d-lg-inline-block"><i class="ti ti-cloud"></i></span>
                                    <span class="nav-link-title">Главная</span>
                                </a>
                            </li>
                            <li class="nav-item {% if request.url.path.startswith('/charts') %}active{% endif %}">
                                <a class="nav-link" href="/charts">
                                    <span class="nav-link-icon d-md-none d-lg-inline-block"><i class="ti ti-chart-line"></i></span>
                                    <span class="nav-link-title">Графики</span>
                                </a>
                            </li>
                            <li class="nav-item {% if request.url.path.startswith('/history') %}active{% endif %}">
                                <a class="nav-link" href="/history">
                                    <span class="nav-link-icon d-md-none d-lg-inline-block"><i class="ti ti-history"></i></span>
                                    <span class="nav-link-title">История</span>
                                </a>
                            </li>
                            <li class="nav-item {% if request.url.path.startswith('/station') %}active{% endif %}">
                                <a class="nav-link" href="/station">
                                    <span class="nav-link-icon d-md-none d-lg-inline-block"><i class="ti ti-heartbeat"></i></span>
                                    <span class="nav-link-title">Состояние станции</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </header>

        <div class="page-wrapper">
            {% block content %}{% endblock %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
    <script>
        (function () {
            const btn = document.getElementById("theme-toggle");
            if (!btn) return;
            const icon = btn.querySelector("i");

            const setTheme = (theme) => {
                document.documentElement.setAttribute("data-bs-theme", theme);
                localStorage.setItem("theme", theme);
                if (icon) {
                    icon.className = theme === "dark" ? "ti ti-moon" : "ti ti-sun";
                }
            };

            setTheme(localStorage.getItem("theme") || "light");
            btn.addEventListener("click", () => {
                const current = document.documentElement.getAttribute("data-bs-theme") || "light";
                setTheme(current === "dark" ? "light" : "dark");
                if (window.dispatchEvent) {
                    window.dispatchEvent(new CustomEvent("theme-changed"));
                }
            });
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
